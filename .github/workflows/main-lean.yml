name: svn-lean

on:
#  schedule:
#    - cron: 0 20 * * *
# push:
#   branches: 
#     - lean
  watch:
    types: [started]
    branches: 
      - lean

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest

    steps:
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d
          sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* mysql* php*
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch unzip zlib1g-dev lib32gcc1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler
          sudo ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          
    - name: Clone source code
      env: 
        REPO_URL: https://github.com/Lienol/openwrt
        REPO_BRANCH: dev-lean-lede
      run: | 
         git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt 
         rm -rf openwrt/package/default-settings
         rm -rf openwrt/package/lean/luci-app-flowoffload
         git clone https://github.com/weiwuji1/default-settings openwrt/package/default-settings
         git clone https://github.com/vernesong/OpenClash openwrt/package/openclash         
         git clone https://github.com/destan19/OpenAppFilter openwrt/package/OpenAppFilter
         git clone https://github.com/weiwuji1/luci-app-vssr-plus openwrt/package/luci-app-vssr-plus
         git clone https://github.com/weiwuji1/my openwrt/package/my
         git clone https://github.com/Leo-Jo-My/luci-theme-opentomcat openwrt/package/lean/luci-theme-opentomcat  
         svn checkout https://github.com/Leo-Jo-My/openwrt18.06/trunk/package/my/AdGuardHome openwrt/package/my/AdGuardHome
         svn checkout https://github.com/Leo-Jo-My/openwrt18.06/trunk/package/my/Openwrt-BBR-master/bbr-nanqinlang openwrt/package/my/bbr-nanqinlang
         svn checkout https://github.com/Leo-Jo-My/openwrt18.06/trunk/package/my/luci-app-smartdns openwrt/package/my/luci-app-smartdns
         svn checkout https://github.com/Leo-Jo-My/openwrt18.06/trunk/package/my/smartdns openwrt/package/my/smartdns            
         svn checkout https://github.com/Leo-Jo-My/openwrt18.06/trunk/package/my/luci-app-koolproxyR openwrt/package/my/luci-app-koolproxyR
         svn checkout https://github.com/Leo-Jo-My/openwrt18.06/trunk/package/my/luci-app-serverchan openwrt/package/my/luci-app-serverchan
         svn checkout https://github.com/Leo-Jo-My/openwrt18.06/trunk/package/my/luci-theme-argon-mod openwrt/package/my/luci-theme-argon-mod
         svn checkout https://github.com/Leo-Jo-My/openwrt18.06/trunk/package/lean/luci-app-flowoffload openwrt/package/lean/luci-app-flowoffload         
         svn checkout https://github.com/coolsnowwolf/lede/trunk/package/lean/ipt2socks openwrt/package/lean/ipt2socks
         svn checkout https://github.com/coolsnowwolf/lede/trunk/package/lean/shadowsocksr-libev openwrt/package/lean/shadowsocksr-libev
         svn checkout https://github.com/coolsnowwolf/lede/trunk/package/lean/luci-app-cifs-mount openwrt/package/lean/luci-app-cifs-mount                       
         sed -i 's#192.168.1.1#10.1.1.11#g' openwrt/package/base-files/files/bin/config_generate #定制默认IP            
      
            
    - name: Clone Config
      env: 
        REPO_URL: https://github.com/weiwuji1/we
        REPO_BRANCH: lean
      run: git clone --depth 1 $REPO_URL -b $REPO_BRANCH we
    
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a
          
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a
    
    - name: Custom configure file
      run: |
          cd openwrt
          rm -f .config
          cp ../we/lean-1907 .config
               
          
    - name: Make Defconfig
      run: |
          cd openwrt
          make defconfig
    - name: SSH connection to Actions
      env:
        SSH_ACTIONS: false
      uses: P3TERX/debugger-action@master
      if: env.SSH_ACTIONS == 'true'

    - name: Make download
      run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          
    - name: Multi-thread compile
      run: |
          cd openwrt
          echo -e "$(nproc) thread build."
          make -j$(nproc) V=s
    - name: Single-thread compile
      if: failure()
      run: |
          cd openwrt
          make -j1 V=s
    - name: Assemble artifact
      run: |
          rm -rf ./artifact/
          mkdir -p ./artifact/
          find openwrt/bin/targets/ -name "*sysupgrade*bin*" | xargs -i mv -f {} ./artifact/
          find openwrt/bin/targets/ -name "*combined*img*" | xargs -i mv -f {} ./artifact/
          find openwrt/bin/package | xargs -i mv -f {} ./artifact/
    - name: Upload artifact
      uses: actions/upload-artifact@master
      with:
        name: OpenWrt firmware
        path: ./artifact/
