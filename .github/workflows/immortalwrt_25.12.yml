# Lisence: MIT
# Author: kenzo
#=================================================

name: immortalwrt_25.12

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection'
        required: false
        default: 'false'
      clean_cache:
        description: 'Clean cache before build'
        required: false
        default: 'false'

env:
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: false
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
  REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
  DOCKER_ID: ${{ secrets.DOCKER_ID }}
  DOCKER_PASSWD: ${{ secrets.DOCKER_PASSWD }}
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    continue-on-error: false

    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target: [immortalwrt]
        include:
          - target: immortalwrt
            config_file: immortalwrt_25.12.config
            device_name: ImmortalWrt-25.12

    steps:
    - name: Maximize build space
      uses: coder-xiaomo/free-disk-space@main
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        persist-credentials: false

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget \
          llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils ccache rename \
          libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        echo "Build date: $(date)"

    - name: Get current date
      id: date
      run: |
        echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
        echo "date2=$(date +'%m/%d %Y')" >> $GITHUB_ENV
        echo "date3=$(date +'%m.%d')" >> $GITHUB_ENV
        echo "DOCKERTAG=${{ secrets.DOCKER_ID }}/openwrt-6p:latest" >> $GITHUB_ENV
        VERSION="$(echo "${{github.event.action}}" | grep -Eo " [0-9.]+" | sed -e 's/ //')" || true
        if [ -n "$VERSION" ]; then
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        else
          echo "VERSION=$(date +'%m.%d')" >> $GITHUB_ENV
        fi

    - name: Clone source code
      working-directory: ./
      run: |
        git config --global init.defaultBranch master
        git config --global advice.detachedHead false
        git clone --depth 1 --single-branch "$REPO_URL" -b "$REPO_BRANCH" openwrt
        cd openwrt
        echo "src-git smpackage https://github.com/kenzok8/small-package" >> feeds.conf.default
        echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default
        echo "Source code cloned successfully"

    - name: Update feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        echo "Feeds updated successfully"

    - name: Apply customizations
      env:
        CONFIG_FILE: '${{ matrix.config_file }}'
      run: |
        cd openwrt
        
        # 1. Apply Config File
        if [ -f "${{ github.workspace }}/$CONFIG_FILE" ]; then
          cp -f "${{ github.workspace }}/$CONFIG_FILE" .config
          echo "Config file applied: $CONFIG_FILE"
        else
          echo "Error: Config file not found: $CONFIG_FILE"
          exit 1
        fi
        
        # 2. Replace Golang Feed
        rm -rf feeds/packages/lang/golang
        git clone --depth 1 https://github.com/kenzok8/golang feeds/packages/lang/golang
        
        # 3. Create Default Configuration Files using echo -e (Safe YAML syntax)
        
        # Set Default IP: 10.1.1.110
        echo -e "config interface 'loopback'\n\toption device 'lo'\n\toption proto 'static'\n\toption ipaddr '127.0.0.1'\n\toption netmask '255.0.0.0'\n\nconfig interface 'lan'\n\toption device 'br-lan'\n\toption proto 'static'\n\toption ipaddr '10.1.1.110'\n\toption netmask '255.255.255.0'\n\toption ip6assign '60'\n\toption gateway '10.1.1.1'\n\toption dns '10.1.1.1 223.5.5.5'" > package/base-files/files/etc/config/network
        echo "Default IP set to 10.1.1.110"

        # Set Hostname and Timezone
        echo -e "config system\n\toption hostname 'ImmortalWrt'\n\toption timezone 'CST-8'\n\toption timezonefile '/usr/share/zoneinfo/Asia/Shanghai'" > package/base-files/files/etc/config/system
        echo "Hostname set to ImmortalWrt, Timezone set to Asia/Shanghai"

        # Set Default Wireless (Disabled)
        echo -e "config wifi-device 'radio0'\n\toption type 'mac80211'\n\toption channel '11'\n\toption hwmode '11g'\n\toption path 'platform/*/ieee80211/phy0'\n\toption disabled '1'\n\nconfig wifi-iface 'default_radio0'\n\toption device 'radio0'\n\toption network 'lan'\n\toption mode 'ap'\n\toption ssid 'ImmortalWrt'\n\toption encryption 'none'\n\toption disabled '1'" > package/base-files/files/etc/config/wireless
        echo "Default wireless config created (disabled)"

        # 4. Apply Default Settings UI
        cp -f "${{ github.workspace }}/default-settings" package/emortal/default-settings/files/99-default-settings 2>/dev/null || true
        
        # 5. Remove Conflicting Packages
        rm -rf feeds/packages/net/{alist,adguardhome,brook,gost,mosdns,redsocks*,smartdns,trojan*,v2ray*,xray*}
        rm -rf feeds/packages/luci/{luci-app-homeproxy,luci-app-openclash,luci-app-passwall}
        
        # 6. Clone Specific Themes
        rm -rf feeds/smpackage/luci-theme-design
        git clone --depth 1 -b js --single-branch https://github.com/kenzok78/luci-theme-design feeds/smpackage/luci-theme-design
        
        # 7. Apply Patches
        if [ -f "feeds/smpackage/.github/diy/patches/0004-luci-mod-status-firewall-disable-legacy-firewall-rul.patch" ]; then
          patch -p1 < "feeds/smpackage/.github/diy/patches/0004-luci-mod-status-firewall-disable-legacy-firewall-rul.patch" || true
        fi
        
        # 8. Finalize Feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 9. Re-apply config
        cp -f "${{ github.workspace }}/${{ matrix.config_file }}" .config
        make defconfig
        
        echo "Customizations applied successfully"

    - name: Cache
      uses: klever1988/cachewrtbuild@main
      if: github.event.inputs.clean_cache != 'true'
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt
        cache_key: ${{ matrix.target }}-${{ hashFiles('**/config.*') }}

    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \\;
        echo "Packages downloaded successfully"

    - name: Check space usage
      run: |
        df -hT
        echo "Available space:"
        df -hT "${{ github.workspace }}"

    - name: Compile the firmware
      id: compile
      working-directory: ./openwrt
      run: |
        THREADS=$(($(nproc)+1))
        echo "Compiling with $THREADS threads..."
        make -j$THREADS || make -j1 V=s
        echo "Compilation completed successfully"

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: always() && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ matrix.device_name }}_${{ env.date }}
        path: openwrt/bin
        retention-days: 7
        compression-level: 6

    - name: Generate firmware information
      if: always()
      working-directory: ./openwrt
      run: |
        echo "=== Firmware Information ==="
        echo "Target: ${{ matrix.target }}"
        echo "Version: $VERSION"
        echo "Build Date: ${{ env.date }}"
        ls -lh bin/targets/*/
        df -hT

    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 2
        delete_run_pattern: "immortalwrt_25.12"
