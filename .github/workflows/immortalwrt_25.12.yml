name: immortalwrt_25.12

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection'
        required: false
        default: 'false'
      clean_cache:
        description: 'Clean cache before build'
        required: false
        default: 'false'

env:
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: false
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
  REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
  DOCKER_ID: ${{ secrets.DOCKER_ID }}
  DOCKER_PASSWD: ${{ secrets.DOCKER_PASSWD }}
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: false

    name: Build ImmortalWrt-25.12
    strategy:
      fail-fast: false

    steps:
    - name: Maximize build space
      uses: coder-xiaomo/free-disk-space@main
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        persist-credentials: false

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget \
          llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils ccache rename \
          libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        echo "Build date: $(date)"

    - name: Get current date
      id: date
      run: |
        echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
        echo "date2=$(date +'%m/%d %Y')" >> $GITHUB_ENV
        echo "date3=$(date +'%m.%d')" >> $GITHUB_ENV
        echo "DOCKERTAG=${{ secrets.DOCKER_ID }}/openwrt-6p:latest" >> $GITHUB_ENV
        VERSION="$(echo "${{github.event.action}}" | grep -Eo " [0-9.]+" | sed -e 's/ //')" || true
        if [ -n "$VERSION" ]; then
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        else
          echo "VERSION=$(date +'%m.%d')" >> $GITHUB_ENV
        fi

    - name: Clone source code
      working-directory: ./
      run: |
        git config --global init.defaultBranch master
        git config --global advice.detachedHead false
        git clone --depth 1 --single-branch "$REPO_URL" -b "$REPO_BRANCH" openwrt
        cd openwrt
        echo "src-git smpackage https://github.com/kenzok8/small-package" >> feeds.conf.default
        echo "src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main" >> feeds.conf.default

    - name: Update feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a

    - name: Apply customizations
      env:
        CONFIG_FILE: 'immortalwrt_25.12.config'
      run: |
        cd openwrt
        
        # 1. Apply Config File
        if [ -f "../$CONFIG_FILE" ]; then
          cp -f "../$CONFIG_FILE" .config
          echo "Config applied."
        else
          echo "Error: Config not found!"
          exit 1
        fi
        
        # 2. Replace Golang Feed
        rm -rf feeds/packages/lang/golang
        git clone --depth 1 https://github.com/kenzok8/golang feeds/packages/lang/golang
        
        # 3. Create Default Network Config (IP: 10.1.1.110)
        mkdir -p package/base-files/files/etc/config
        echo "config interface 'loopback'" > package/base-files/files/etc/config/network
        echo "    option device 'lo'" >> package/base-files/files/etc/config/network
        echo "    option proto 'static'" >> package/base-files/files/etc/config/network
        echo "    option ipaddr '127.0.0.1'" >> package/base-files/files/etc/config/network
        echo "    option netmask '255.0.0.0'" >> package/base-files/files/etc/config/network
        echo "" >> package/base-files/files/etc/config/network
        echo "config interface 'lan'" >> package/base-files/files/etc/config/network
        echo "    option device 'br-lan'" >> package/base-files/files/etc/config/network
        echo "    option proto 'static'" >> package/base-files/files/etc/config/network
        echo "    option ipaddr '10.1.1.110'" >> package/base-files/files/etc/config/network
        echo "    option netmask '255.255.255.0'" >> package/base-files/files/etc/config/network
        echo "    option ip6assign '60'" >> package/base-files/files/etc/config/network
        echo "    option gateway '10.1.1.1'" >> package/base-files/files/etc/config/network
        echo "    option dns '10.1.1.1 223.5.5.5'" >> package/base-files/files/etc/config/network

        # 4. Create Default System Config (Hostname & Timezone)
        echo "config system" > package/base-files/files/etc/config/system
        echo "    option hostname 'ImmortalWrt'" >> package/base-files/files/etc/config/system
        echo "    option timezone 'CST-8'" >> package/base-files/files/etc/config/system
        echo "    option timezonefile '/usr/share/zoneinfo/Asia/Shanghai'" >> package/base-files/files/etc/config/system

        # 5. Create Default Wireless Config (Disabled)
        echo "config wifi-device 'radio0'" > package/base-files/files/etc/config/wireless
        echo "    option type 'mac80211'" >> package/base-files/files/etc/config/wireless
        echo "    option channel '11'" >> package/base-files/files/etc/config/wireless
        echo "    option hwmode '11g'" >> package/base-files/files/etc/config/wireless
        echo "    option path 'platform/*/ieee80211/phy0'" >> package/base-files/files/etc/config/wireless
        echo "    option disabled '1'" >> package/base-files/files/etc/config/wireless
        echo "" >> package/base-files/files/etc/config/wireless
        echo "config wifi-iface 'default_radio0'" >> package/base-files/files/etc/config/wireless
        echo "    option device 'radio0'" >> package/base-files/files/etc/config/wireless
        echo "    option network 'lan'" >> package/base-files/files/etc/config/wireless
        echo "    option mode 'ap'" >> package/base-files/files/etc/config/wireless
        echo "    option ssid 'ImmortalWrt'" >> package/base-files/files/etc/config/wireless
        echo "    option encryption 'none'" >> package/base-files/files/etc/config/wireless
        echo "    option disabled '1'" >> package/base-files/files/etc/config/wireless

        # 6. Remove Conflicting Packages
        rm -rf feeds/packages/net/{alist,adguardhome,brook,gost,mosdns,redsocks*,smartdns,trojan*,v2ray*,xray*}
        rm -rf feeds/packages/luci/{luci-app-homeproxy,luci-app-openclash,luci-app-passwall}
        
        # 7. Clone Theme
        rm -rf feeds/smpackage/luci-theme-design
        git clone --depth 1 -b js --single-branch https://github.com/kenzok78/luci-theme-design feeds/smpackage/luci-theme-design
        
        # 8. Finalize Feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 9. Re-apply config
        cp -f "../$CONFIG_FILE" .config
        make defconfig

    - name: Cache
      uses: klever1988/cachewrtbuild@main
      if: github.event.inputs.clean_cache != 'true'
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt
        cache_key: immortalwrt-${{ hashFiles('**/config.*') }}

    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \;

    - name: Check space usage
      run: df -hT

    - name: Compile the firmware
      id: compile
      working-directory: ./openwrt
      run: |
        THREADS=$(($(nproc)+1))
        echo "Compiling with $THREADS threads..."
        make -j$THREADS || make -j1 V=s

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: always() && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_ImmortalWrt-25.12_${{ env.date }}
        path: openwrt/bin
        retention-days: 7
        compression-level: 6

    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 2
        delete_run_pattern: "immortalwrt_25.12"
